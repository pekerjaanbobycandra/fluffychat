name: Build Android Test APK

on:
  workflow_dispatch: # Murni hanya berjalan jika diklik manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Inject Firebase Key & Change Package Name
        run: |
          # 1. Radar otomatis mencari letak file build.gradle di dalam project
          GRADLE_FILE=$(find . -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) | grep "android/app" | head -n 1)
          
          if [ -z "$GRADLE_FILE" ]; then
            echo "ERROR: File build.gradle tidak ditemukan di folder android/app!"
            exit 1
          fi
          
          echo "Berhasil menemukan lokasi file di: $GRADLE_FILE"
          
          # 2. Tentukan folder tujuan google-services.json secara dinamis
          APP_DIR=$(dirname "$GRADLE_FILE")
          echo '${{ secrets.FIREBASE_JSON }}' > "$APP_DIR/google-services.json"
          echo "google-services.json berhasil disuntikkan ke $APP_DIR"
          
          # 3. Ubah nama Package ID sesuai tipe file yang ditemukan (.gradle atau .kts)
          if [[ "$GRADLE_FILE" == *".kts" ]]; then
            sed -i 's/applicationId = ".*"/applicationId = "com.desacluring.hub"/g' "$GRADLE_FILE"
          else
            sed -i 's/applicationId ".*"/applicationId "com.desacluring.hub"/g' "$GRADLE_FILE"
          fi
          echo "Application ID berhasil diperbarui menjadi com.desacluring.hub"
          
          # 4. Ambil dependensi Flutter
          flutter pub get

      - name: Build APK Release (Mode Langsing)
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: desacluring-chat-test
          path: build/app/outputs/flutter-apk/app-*.apk
